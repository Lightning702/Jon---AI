<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Jon</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 10px;
      }
      #bubble {
        max-width: 288px;
        margin-bottom: 10px;
        padding: 12px 15px;
        border-radius: 16px 16px 16px 4px;
        background: rgba(14, 14, 18, 0.92);
        border: 1px solid rgba(212, 175, 55, 0.4);
        color: #f4f0e6;
        font-size: 13.5px;
        line-height: 1.45;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.25s, transform 0.25s;
        pointer-events: none;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      #bubble.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      #bubble::-webkit-scrollbar {
        width: 5px;
      }
      #bubble::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.4);
        border-radius: 5px;
      }
      #inputRow {
        display: none;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
        width: 288px;
      }
      #inputRow.show {
        display: flex;
      }
      #field {
        flex: 1;
        padding: 9px 13px;
        border-radius: 999px;
        border: 1px solid rgba(212, 175, 55, 0.45);
        background: rgba(10, 10, 14, 0.95);
        color: #f4f0e6;
        font-size: 13px;
        outline: none;
      }
      #field::placeholder {
        color: rgba(244, 240, 230, 0.4);
      }
      #jonWrap {
        position: relative;
        width: 120px;
        height: 120px;
        transform-origin: center bottom;
      }
      #jon {
        width: 120px;
        height: 120px;
        cursor: pointer;
        animation: bob 4.5s ease-in-out infinite;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.55));
      }
      #jon:active {
        cursor: grabbing;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      #eyes {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.08s;
      }
      .thinking #ring {
        animation: spin 1.4s linear infinite;
        stroke-dasharray: 40 260;
      }
      .listening #ring {
        stroke: #8fe3a0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #ring {
        transform-origin: 60px 60px;
      }
      .petBtn {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.5);
        background: rgba(20, 20, 24, 0.85);
        color: #d4af37;
        font-size: 11px;
        cursor: pointer;
        display: none;
        z-index: 6;
        line-height: 1;
      }
      #mic {
        top: 2px;
        left: 0;
      }
      #stopBtn {
        top: 2px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff8a8a;
        border-color: rgba(255, 120, 120, 0.5);
      }
      #close {
        top: 2px;
        right: 0;
        color: rgba(244, 240, 230, 0.6);
        border: none;
      }
      #mic.off {
        color: rgba(244, 240, 230, 0.35);
        border-color: rgba(255, 255, 255, 0.15);
      }
      #jonWrap:hover #mic,
      #jonWrap:hover #close {
        display: block;
      }
      #close:hover {
        color: #ff8080;
      }
      body.busy #jonWrap #stopBtn {
        display: block;
      }
      body.light #bubble {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(0, 0, 0, 0.12);
        color: #17171c;
      }
      body.light #field {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(0, 0, 0, 0.15);
        color: #17171c;
      }
      body.light #field::placeholder {
        color: rgba(0, 0, 0, 0.4);
      }
      body.light .petBtn {
        background: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="bubble"></div>
      <div id="inputRow">
        <input id="field" placeholder="Sag Emil etwas …" autocomplete="off" />
      </div>
      <div id="jonWrap">
        <button id="mic" class="petBtn" title="Zuhören an/aus – sag „Emil“">🎙</button>
        <button id="stopBtn" class="petBtn" title="Stopp">⏹</button>
        <button id="close" class="petBtn" title="Mini Jon ausblenden (Strg+Alt+K)">✕</button>
        <div id="jon">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <defs>
              <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f5d67b" />
                <stop offset="55%" stop-color="#d4af37" />
                <stop offset="100%" stop-color="#9a7b1f" />
              </linearGradient>
            </defs>
            <circle id="faceCircle" cx="60" cy="60" r="52" fill="#0a0a0e" />
            <circle
              id="ring"
              cx="60"
              cy="60"
              r="52"
              fill="none"
              stroke="url(#gold)"
              stroke-width="4"
              stroke-linecap="round"
            />
            <g id="cheeks" style="display: none">
              <ellipse cx="38" cy="70" rx="8" ry="5" fill="#ff9bb0" opacity="0.5" />
              <ellipse cx="82" cy="70" rx="8" ry="5" fill="#ff9bb0" opacity="0.5" />
            </g>
            <g id="eyes"></g>
            <path
              id="smile"
              d="M44 76 Q60 90 76 76"
              fill="none"
              stroke="url(#gold)"
              stroke-width="5"
              stroke-linecap="round"
            />
            <ellipse
              id="mouth"
              cx="60"
              cy="80"
              rx="13"
              ry="0"
              fill="url(#gold)"
              style="display: none"
            />
          </svg>
        </div>
      </div>
    </div>

    <script>
      const BASE = "http://127.0.0.1:8756/api";
      const jon = document.getElementById("jon");
      const jonWrap = document.getElementById("jonWrap");
      const bubble = document.getElementById("bubble");
      const inputRow = document.getElementById("inputRow");
      const field = document.getElementById("field");
      const smile = document.getElementById("smile");
      const mouth = document.getElementById("mouth");
      const eyesG = document.getElementById("eyes");
      const cheeks = document.getElementById("cheeks");
      const faceCircle = document.getElementById("faceCircle");
      const grad = document.getElementById("gold");
      const closeBtn = document.getElementById("close");
      const micBtn = document.getElementById("mic");
      const stopBtn = document.getElementById("stopBtn");

      let cfg = {
        theme: "dark",
        pet_accent: "#d4af37",
        pet_face: "#0a0a0e",
        pet_cheeks: false,
        pet_scale: 1,
        pet_eyes: "round",
        provider: "",
        model: "",
        pet_provider: "",
        pet_model: "",
      };
      let bubbleTimer = null;
      let busy = false;
      let mouthTimer = null;
      let currentAbort = null;
      let canceled = false;

      const MEM_KEY = "emil_memory";
      const MEM_MAX = 16;
      const MEM_SEND = 8;
      let convo = [];
      try {
        convo = JSON.parse(localStorage.getItem(MEM_KEY)) || [];
      } catch (e) {
        convo = [];
      }
      function rememberTurn(userText, botText) {
        convo.push({ role: "user", content: userText });
        convo.push({ role: "assistant", content: botText });
        convo = convo.slice(-MEM_MAX);
        try {
          localStorage.setItem(MEM_KEY, JSON.stringify(convo));
        } catch (e) {}
      }

      function clamp(v) {
        return Math.max(0, Math.min(255, Math.round(v)));
      }
      function hexToRgb(h) {
        h = h.replace("#", "");
        if (h.length === 3) h = h.split("").map((c) => c + c).join("");
        return [
          parseInt(h.slice(0, 2), 16),
          parseInt(h.slice(2, 4), 16),
          parseInt(h.slice(4, 6), 16),
        ];
      }
      function toHex(r, g, b) {
        return (
          "#" +
          [r, g, b].map((x) => clamp(x).toString(16).padStart(2, "0")).join("")
        );
      }
      function shade(hex, amt) {
        try {
          const [r, g, b] = hexToRgb(hex);
          if (amt >= 0)
            return toHex(r + (255 - r) * amt, g + (255 - g) * amt, b + (255 - b) * amt);
          const f = 1 + amt;
          return toHex(r * f, g * f, b * f);
        } catch (e) {
          return hex;
        }
      }

      function renderEyes(style) {
        const c = "url(#gold)";
        if (style === "happy") {
          eyesG.innerHTML =
            '<path d="M35 55 Q43 46 51 55" fill="none" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>' +
            '<path d="M69 55 Q77 46 85 55" fill="none" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>';
        } else if (style === "sleepy") {
          eyesG.innerHTML =
            '<path d="M36 53 h13" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>' +
            '<path d="M71 53 h13" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>';
        } else {
          eyesG.innerHTML =
            '<circle cx="43" cy="53" r="8" fill="' +
            c +
            '"/><circle cx="77" cy="53" r="8" fill="' +
            c +
            '"/>' +
            '<circle cx="45.5" cy="50.5" r="2.5" fill="#fff"/>' +
            '<circle cx="79.5" cy="50.5" r="2.5" fill="#fff"/>';
        }
      }

      let lastCfgJson = "";
      function applyConfig(s) {
        const next = { ...cfg, ...s };
        const json = JSON.stringify(next);
        if (json === lastCfgJson) return;
        lastCfgJson = json;
        cfg = next;
        const accent = cfg.pet_accent || "#d4af37";
        const light = cfg.theme === "light";
        document.body.classList.toggle("light", light);
        const stops = grad.children;
        if (light) {
          stops[0].setAttribute("stop-color", accent);
          stops[1].setAttribute("stop-color", shade(accent, -0.2));
          stops[2].setAttribute("stop-color", shade(accent, -0.42));
        } else {
          stops[0].setAttribute("stop-color", shade(accent, 0.35));
          stops[1].setAttribute("stop-color", accent);
          stops[2].setAttribute("stop-color", shade(accent, -0.3));
        }
        faceCircle.setAttribute("fill", light ? "#ffffff" : cfg.pet_face || "#0a0a0e");
        cheeks.style.display = cfg.pet_cheeks ? "block" : "none";
        renderEyes(cfg.pet_eyes || "round");
        jonWrap.style.transform = "scale(" + (cfg.pet_scale || 1) + ")";
      }

      function setState(cls) {
        jon.classList.remove("thinking", "listening");
        if (cls) jon.classList.add(cls);
      }

      function scheduleHide(ms) {
        if (bubbleTimer) clearTimeout(bubbleTimer);
        bubbleTimer = setTimeout(() => bubble.classList.remove("show"), ms);
      }
      function say(text, keep) {
        if (!text) return;
        bubble.textContent = text;
        bubble.classList.add("show");
        if (bubbleTimer) clearTimeout(bubbleTimer);
        if (!keep) scheduleHide(9000);
      }

      function openMouth(a) {
        smile.style.display = a > 0.05 ? "none" : "block";
        mouth.style.display = a > 0.05 ? "block" : "none";
        mouth.setAttribute("ry", (2 + a * 9).toFixed(1));
      }
      function stopMouth() {
        if (mouthTimer) clearInterval(mouthTimer);
        mouthTimer = null;
        openMouth(0);
      }

      let voice = null;
      const MALE = /stefan|klaus|conrad|bernd|jonas|paul|markus|male|mann/i;
      function pickVoice() {
        const voices = window.speechSynthesis.getVoices();
        const german = voices.filter((v) => v.lang.toLowerCase().startsWith("de"));
        voice = german.find((v) => MALE.test(v.name)) || german[0] || voices[0] || null;
      }
      pickVoice();
      window.speechSynthesis.onvoiceschanged = pickVoice;

      let primed = false;
      function primeSpeech() {
        if (primed) return;
        primed = true;
        try {
          window.speechSynthesis.resume();
          const u = new SpeechSynthesisUtterance(" ");
          u.volume = 0;
          window.speechSynthesis.speak(u);
        } catch (e) {}
      }
      function cleanForSpeech(t) {
        return t
          .replace(/```[\s\S]*?```/g, " ")
          .replace(/`[^`]*`/g, " ")
          .replace(/\[(.*?)\]\(.*?\)/g, "$1")
          .replace(/https?:\/\/\S+/g, " Link ")
          .replace(/^\s*[-*+]\s+/gm, " ")
          .replace(/-{2,}/g, " ")
          .replace(/[*_#>`|]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      function speak(text, done) {
        const synth = window.speechSynthesis;
        if (!synth) {
          if (done) done();
          return;
        }
        try {
          synth.cancel();
          if (!voice) pickVoice();
          const clean = cleanForSpeech(text).slice(0, 600);
          if (!clean) {
            if (done) done();
            return;
          }
          const u = new SpeechSynthesisUtterance(clean);
          if (voice) u.voice = voice;
          u.lang = "de-DE";
          u.rate = 1.06;
          u.pitch = voice && MALE.test(voice.name) ? 1.15 : 1.3;
          u.onstart = () => {
            lookX = 0;
            lookY = 0;
            eyeTransform(1);
            if (mouthTimer) clearInterval(mouthTimer);
            mouthTimer = setInterval(() => openMouth(0.25 + Math.random() * 0.75), 95);
          };
          u.onboundary = () => openMouth(0.85);
          u.onend = () => {
            stopMouth();
            if (done) done();
          };
          u.onerror = () => {
            stopMouth();
            if (done) done();
          };
          synth.resume();
          synth.speak(u);
        } catch (e) {
          stopMouth();
          if (done) done();
        }
      }

      let lookX = 0;
      let lookY = 0;
      function eyeTransform(scaleY) {
        const s = scaleY == null ? 1 : scaleY;
        eyesG.style.transform = `translate(${lookX}px, ${lookY}px) scaleY(${s})`;
      }
      function blink() {
        eyeTransform(0.12);
        setTimeout(() => eyeTransform(1), 130);
      }
      function doubleBlink() {
        blink();
        setTimeout(blink, 230);
      }
      function lookAround() {
        lookX = Math.round((Math.random() * 2 - 1) * 7);
        lookY = Math.round((Math.random() * 2 - 1) * 4);
        eyeTransform(1);
        setTimeout(() => {
          lookX = 0;
          lookY = 0;
          eyeTransform(1);
        }, 900 + Math.random() * 900);
      }
      setInterval(() => {
        const r = Math.random();
        if (r < 0.12) doubleBlink();
        else if (r < 0.75) blink();
      }, 3600);
      setInterval(() => {
        if (!busy && Math.random() < 0.6) lookAround();
      }, 2600);
      setInterval(() => {
        if (!busy && !mouthTimer && Math.random() < 0.16) {
          openMouth(0.4);
          setTimeout(() => openMouth(0), 260);
        }
      }, 5000);

      function cancel() {
        canceled = true;
        if (currentAbort) {
          try {
            currentAbort.abort();
          } catch (e) {}
          currentAbort = null;
        }
        try {
          window.speechSynthesis.cancel();
        } catch (e) {}
        stopMouth();
        busy = false;
        document.body.classList.remove("busy");
        listener && listener.setBusy(false);
        setState(listening ? "listening" : "");
        scheduleHide(1500);
      }

      async function ask(text) {
        if (busy || !text.trim()) return;
        busy = true;
        canceled = false;
        document.body.classList.add("busy");
        listener && listener.setBusy(true);
        setState("thinking");
        say("…", true);
        currentAbort = new AbortController();
        let answer = "";
        let replied = false;
        try {
          const res = await fetch(`${BASE}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: currentAbort.signal,
            body: JSON.stringify({
              messages: [...convo.slice(-MEM_SEND), { role: "user", content: text }],
              persist: false,
              tool_mode: "allow",
              persona: "junior",
              slot: "emil",
              max_tokens: 800,
              provider: cfg.pet_provider || cfg.provider || undefined,
              model: cfg.pet_model || undefined,
            }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split("\n\n");
            buf = lines.pop() || "";
            for (const line of lines) {
              const m = line.trim();
              if (!m.startsWith("data:")) continue;
              try {
                const evt = JSON.parse(m.slice(5).trim());
                if (evt.type === "content") {
                  answer += evt.delta;
                  replied = true;
                  say(answer, true);
                } else if (evt.type === "error") {
                  answer = "Ups: " + evt.message;
                }
              } catch (e) {}
            }
          }
        } catch (e) {
          if (canceled) return;
          answer = "Ich erreiche mein Backend gerade nicht.";
        }
        currentAbort = null;
        if (canceled) return;
        answer = answer.trim() || "…";
        if (replied) rememberTurn(text, answer);
        say(answer, true);
        setState("");
        speak(answer, () => {
          busy = false;
          document.body.classList.remove("busy");
          listener && listener.setBusy(false);
          setState(listening ? "listening" : "");
          scheduleHide(3500);
        });
      }

      function greetingByHour() {
        const h = new Date().getHours();
        if (h < 5) return "Noch wach?";
        if (h < 11) return "Guten Morgen";
        if (h < 17) return "Hallo";
        if (h < 22) return "Guten Abend";
        return "Späte Stunde";
      }
      async function startupGreeting() {
        const firstTime = localStorage.getItem("emil_intro") !== "1";
        let extras = [];
        try {
          const due = await (await fetch(`${BASE}/reminders/due`)).json();
          if (Array.isArray(due) && due.length)
            extras.push(`${due.length} fällige Erinnerung(en)`);
        } catch (e) {}
        try {
          const reports = await (await fetch(`${BASE}/dreams/reports`)).json();
          if (Array.isArray(reports) && reports.length)
            extras.push(`${reports.length} Ergebnis(se) aus dem Dream Mode`);
        } catch (e) {}
        if (firstTime) {
          localStorage.setItem("emil_intro", "1");
          let intro =
            `${greetingByHour()}! Ich bin Emil, dein Mini Jon. Sag einfach „Emil“ ` +
            `oder „Mini Jon“, dann höre ich dir zu – oder klick mich an und tipp mir ` +
            `etwas. Ich kann fast alles, was mein Papa Jon kann.`;
          if (extras.length)
            intro += " Ich hab übrigens schon " + extras.join(" und ") + " für dich.";
          say(intro, true);
          scheduleHide(16000);
          return;
        }
        let line = `${greetingByHour()}! Ich bin Emil, dein Mini Jon.`;
        if (extras.length) line += " Ich hab " + extras.join(" und ") + " für dich.";
        else line += " Sag „Emil“ oder klick mich an.";
        say(line);
      }

      const MOOD_FACE = {
        fresh: { eyes: "round", mouth: "smile" },
        content: { eyes: "happy", mouth: "smile" },
        curious: { eyes: "round", mouth: "small" },
        focused: { eyes: "round", mouth: "flat" },
        wistful: { eyes: "sleepy", mouth: "flat" },
        proud: { eyes: "happy", mouth: "smile" },
        tired: { eyes: "sleepy", mouth: "flat" },
      };
      let currentMood = "";
      function applyMood(mood) {
        if (!mood || mood === currentMood) return;
        currentMood = mood;
        const face = MOOD_FACE[mood];
        if (!face) return;
        renderEyes(face.eyes);
        if (face.mouth === "smile") smile.setAttribute("d", "M44 76 Q60 90 76 76");
        else if (face.mouth === "small") smile.setAttribute("d", "M50 78 Q60 86 70 78");
        else smile.setAttribute("d", "M46 80 H74");
      }
      async function pollMood() {
        try {
          const p = await (await fetch(`${BASE}/persona`)).json();
          if (p && p.mood) applyMood(String(p.mood));
        } catch (e) {}
      }
      setInterval(pollMood, 45000);
      setTimeout(pollMood, 3000);

      async function pollFriends() {
        try {
          const news = await (
            await fetch(`${BASE}/p2p/notifications?channel=pet`)
          ).json();
          if (!Array.isArray(news) || !news.length) return;
          for (const n of news) {
            const preview =
              n.text ||
              (n.media_kind === "image"
                ? "ein Foto"
                : n.media_kind === "video"
                  ? "ein Video"
                  : n.media_kind === "audio"
                    ? "eine Sprachnachricht"
                    : "eine Datei");
            const line = `${n.avatar || "💬"} ${n.sender_name} schreibt: ${preview}`;
            say(line, true);
            scheduleHide(12000);
            speak(`${n.sender_name} schreibt dir: ${preview}`);
          }
        } catch (e) {}
      }
      setInterval(pollFriends, 5000);

      let wasAway = false;
      async function pollPresence() {
        try {
          const r = await (await fetch(`${BASE}/system/idle`)).json();
          const idle = Number(r.seconds || 0);
          if (idle > 600) {
            wasAway = true;
          } else if (wasAway && idle < 5) {
            wasAway = false;
            if (!busy) {
              say("Da bist du ja wieder! 😊 Was machen wir jetzt?");
              speak("Da bist du ja wieder! Was machen wir jetzt?");
            }
          }
        } catch (e) {}
      }
      setInterval(pollPresence, 20000);

      const WAKE = new Set(["emil", "emile", "emilio", "emmi", "email", "mini"]);
      const SPEECH_THRESHOLD = 0.015;
      const SILENCE_END_MS = 1100;
      const MIN_SPEECH_MS = 350;
      const MAX_UTTERANCE_MS = 15000;
      const PREROLL = 5;
      let listening = false;

      function downsample(chunks, rate) {
        let total = 0;
        for (const c of chunks) total += c.length;
        const merged = new Float32Array(total);
        let o = 0;
        for (const c of chunks) {
          merged.set(c, o);
          o += c.length;
        }
        const ratio = rate / 16000;
        const outLen = Math.floor(merged.length / ratio);
        const out = new Int16Array(outLen);
        for (let i = 0; i < outLen; i++) {
          const start = Math.floor(i * ratio);
          const end = Math.min(Math.floor((i + 1) * ratio), merged.length);
          let sum = 0;
          for (let j = start; j < end; j++) sum += merged[j];
          const s = sum / Math.max(end - start, 1);
          out[i] = Math.max(-1, Math.min(1, s)) * 0x7fff;
        }
        return out;
      }
      function encodeWav(samples) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);
        const ws = (p, s) => {
          for (let i = 0; i < s.length; i++) view.setUint8(p + i, s.charCodeAt(i));
        };
        ws(0, "RIFF");
        view.setUint32(4, 36 + samples.length * 2, true);
        ws(8, "WAVE");
        ws(12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, 16000, true);
        view.setUint32(28, 32000, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        ws(36, "data");
        view.setUint32(40, samples.length * 2, true);
        for (let i = 0; i < samples.length; i++)
          view.setInt16(44 + i * 2, samples[i], true);
        return new Blob([buffer], { type: "audio/wav" });
      }

      class Listener {
        constructor() {
          this.preroll = [];
          this.utt = [];
          this.inUtt = false;
          this.speechMs = 0;
          this.silenceMs = 0;
          this.uttMs = 0;
          this.engaged = false;
          this.running = false;
          this.busy = false;
        }
        setBusy(b) {
          this.busy = b;
        }
        async start() {
          if (this.running) return;
          this.stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          this.ctx = new AudioContext();
          await this.ctx.resume().catch(() => {});
          this.src = this.ctx.createMediaStreamSource(this.stream);
          this.proc = this.ctx.createScriptProcessor(4096, 1, 1);
          this.proc.onaudioprocess = (e) => this.onChunk(e);
          this.src.connect(this.proc);
          this.proc.connect(this.ctx.destination);
          this.running = true;
          this.engaged = false;
          listening = true;
          setState("listening");
        }
        stop() {
          this.running = false;
          this.engaged = false;
          listening = false;
          try {
            this.proc && this.proc.disconnect();
            this.src && this.src.disconnect();
            this.stream && this.stream.getTracks().forEach((t) => t.stop());
            this.ctx && this.ctx.close();
          } catch (e) {}
          setState("");
        }
        onChunk(e) {
          if (!this.running) return;
          const input = e.inputBuffer.getChannelData(0);
          const chunk = new Float32Array(input);
          const chunkMs = (chunk.length / this.ctx.sampleRate) * 1000;
          if (this.busy) {
            this.inUtt = false;
            this.utt = [];
            return;
          }
          let sum = 0;
          for (let i = 0; i < chunk.length; i++) sum += chunk[i] * chunk[i];
          const voiced = Math.sqrt(sum / chunk.length) > SPEECH_THRESHOLD;
          if (!this.inUtt) {
            this.preroll.push(chunk);
            if (this.preroll.length > PREROLL) this.preroll.shift();
            if (voiced) {
              this.inUtt = true;
              this.utt = [...this.preroll];
              this.speechMs = chunkMs;
              this.silenceMs = 0;
              this.uttMs = chunkMs;
            }
            return;
          }
          this.utt.push(chunk);
          this.uttMs += chunkMs;
          if (voiced) {
            this.speechMs += chunkMs;
            this.silenceMs = 0;
          } else this.silenceMs += chunkMs;
          if (this.silenceMs >= SILENCE_END_MS || this.uttMs >= MAX_UTTERANCE_MS) {
            const chunks = this.utt;
            const speechMs = this.speechMs;
            this.inUtt = false;
            this.utt = [];
            this.preroll = [];
            if (speechMs >= MIN_SPEECH_MS) this.finish(chunks, this.ctx.sampleRate);
          }
        }
        async finish(chunks, rate) {
          let text = "";
          try {
            const wav = encodeWav(downsample(chunks, rate));
            const res = await fetch(`${BASE}/system/transcribe`, {
              method: "POST",
              body: wav,
            });
            text = ((await res.json()).text || "").trim();
          } catch (e) {}
          if (!this.running || this.busy) return;
          this.handle(text);
        }
        handle(text) {
          if (!text) return;
          const words = text
            .toLowerCase()
            .replace(/[^\p{L}\p{N} ]/gu, " ")
            .split(/\s+/)
            .filter(Boolean);
          if (this.engaged) {
            ask(text);
            return;
          }
          const idx = words.findIndex((w) => WAKE.has(w));
          if (idx < 0) return;
          this.engaged = true;
          let start = idx + 1;
          if (words[idx] === "mini" && (words[start] === "jon" || words[start] === "john"))
            start += 1;
          const command = words.slice(start).join(" ").trim();
          if (command.length >= 3) ask(command);
          else {
            primeSpeech();
            say("Ja?", true);
            speak("Ja?", () => scheduleHide(2500));
          }
        }
      }

      let listener = null;
      function setMic(on) {
        localStorage.setItem("jonjr_voice", on ? "1" : "0");
        micBtn.classList.toggle("off", !on);
        if (on) {
          if (!listener) listener = new Listener();
          listener.start().catch(() => {
            micBtn.classList.add("off");
            localStorage.setItem("jonjr_voice", "0");
          });
        } else if (listener) {
          listener.stop();
          listener = null;
        }
      }
      micBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        primeSpeech();
        setMic(localStorage.getItem("jonjr_voice") === "0");
      });
      stopBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        cancel();
      });

      let dragging = false;
      let moved = 0;
      let lastX = 0;
      let lastY = 0;
      let clickTimer = null;
      function tap() {
        primeSpeech();
        if (busy) {
          cancel();
          return;
        }
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          window.jonpet && window.jonpet.showApp();
          return;
        }
        clickTimer = setTimeout(() => {
          clickTimer = null;
          inputRow.classList.toggle("show");
          if (inputRow.classList.contains("show")) field.focus();
        }, 240);
      }
      jon.addEventListener("mousedown", (e) => {
        dragging = true;
        moved = 0;
        lastX = e.screenX;
        lastY = e.screenY;
        e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (dragging) {
          const dx = e.screenX - lastX;
          const dy = e.screenY - lastY;
          lastX = e.screenX;
          lastY = e.screenY;
          moved += Math.abs(dx) + Math.abs(dy);
          if ((dx || dy) && window.jonpet) window.jonpet.moveBy(dx, dy);
          applyIgnore(false);
          return;
        }
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const interactive =
          el &&
          el.closest(
            "#jon, #mic, #close, #stopBtn, #bubble.show, #inputRow.show"
          );
        applyIgnore(!interactive);
      });
      window.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        if (moved < 6) tap();
      });

      let ignoring = null;
      function applyIgnore(next) {
        if (next === ignoring) return;
        ignoring = next;
        window.jonpet && window.jonpet.setIgnore(next);
      }

      field.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const t = field.value;
          field.value = "";
          inputRow.classList.remove("show");
          ask(t);
        }
        if (e.key === "Escape") inputRow.classList.remove("show");
      });
      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        window.jonpet && window.jonpet.hide();
      });

      async function loadConfig() {
        try {
          const s = await (await fetch(`${BASE}/settings`)).json();
          applyConfig(s);
        } catch (e) {}
      }

      renderEyes("round");
      applyIgnore(true);
      loadConfig();
      setInterval(loadConfig, 1500);
      if (localStorage.getItem("jonjr_voice") !== "0") setTimeout(() => setMic(true), 1500);
      else micBtn.classList.add("off");
      setTimeout(startupGreeting, 1200);
    </script>
  </body>
</html>

<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Jon</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 10px;
      }
      #petPal {
        position: absolute;
        left: 14px;
        bottom: 8px;
        width: 66px;
        height: 66px;
        display: none;
        pointer-events: auto;
        cursor: pointer;
        transition: transform 0.25s ease;
        z-index: 3;
      }
      #petPal.show { display: block; }
      #petPal.happy { animation: palHop 0.6s ease; }
      #petZzz {
        position: absolute;
        left: 60px;
        bottom: 52px;
        color: #bcd0ff;
        font-size: 15px;
        opacity: 0;
        pointer-events: none;
        z-index: 3;
        text-shadow: 0 1px 3px #000;
      }
      #petZzz.show { animation: zzzFloat 2.4s ease-in-out infinite; }
      @keyframes palHop {
        0%, 100% { transform: translateY(0) scaleX(var(--dir, 1)); }
        40% { transform: translateY(-14px) scaleX(var(--dir, 1)); }
      }
      @keyframes zzzFloat {
        0% { opacity: 0; transform: translateY(4px); }
        50% { opacity: 0.9; transform: translateY(-6px); }
        100% { opacity: 0; transform: translateY(-16px); }
      }
      #jonZzz {
        position: absolute;
        right: -4px;
        top: -8px;
        color: #f0d98a;
        font-size: 20px;
        letter-spacing: 3px;
        opacity: 0;
        pointer-events: none;
        z-index: 6;
        text-shadow: 0 1px 3px #000;
      }
      #jonZzz.show { animation: zzzFloat 2.8s ease-in-out infinite; }
      body.miniSleep #jon svg { animation: miniBreath 4.2s ease-in-out infinite; }
      @keyframes miniBreath {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.035); }
      }
      #petHeart {
        position: absolute;
        left: 40px;
        bottom: 60px;
        font-size: 16px;
        opacity: 0;
        pointer-events: none;
        z-index: 3;
      }
      #petHeart.show { animation: heartPop 1.2s ease; }
      @keyframes heartPop {
        0% { opacity: 0; transform: translateY(0) scale(0.6); }
        30% { opacity: 1; transform: translateY(-8px) scale(1.1); }
        100% { opacity: 0; transform: translateY(-24px) scale(0.9); }
      }
      .heartParticle {
        position: absolute;
        font-size: 18px;
        pointer-events: none;
        z-index: 6;
        will-change: transform, opacity;
        animation: heartFloat 1.5s ease-out forwards;
      }
      @keyframes heartFloat {
        0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(var(--rot, 0deg)); }
        20% { opacity: 1; transform: translateY(-18px) scale(1.15) rotate(var(--rot, 0deg)); }
        100% { opacity: 0; transform: translateY(-64px) scale(0.85) translateX(var(--drift, 0px)) rotate(var(--rot, 0deg)); }
      }
      #petSpeech {
        position: absolute;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        pointer-events: none;
        z-index: 6;
        opacity: 0;
        text-shadow: 0 1px 4px #000;
      }
      #petSpeech.show { animation: petSpeechPop 1.3s ease; }
      @keyframes petSpeechPop {
        0% { opacity: 0; transform: translateY(2px) scale(0.8); }
        25% { opacity: 1; transform: translateY(-6px) scale(1); }
        100% { opacity: 0; transform: translateY(-18px) scale(0.95); }
      }
      #bubble {
        max-width: 288px;
        margin-bottom: 10px;
        padding: 12px 15px;
        border-radius: 16px 16px 16px 4px;
        background: rgba(14, 14, 18, 0.92);
        border: 1px solid rgba(212, 175, 55, 0.4);
        color: #f4f0e6;
        font-size: 13.5px;
        line-height: 1.45;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.25s, transform 0.25s;
        pointer-events: none;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      #bubble.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      #bubble::-webkit-scrollbar {
        width: 5px;
      }
      #bubble::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.4);
        border-radius: 5px;
      }
      #inputRow {
        display: none;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
        width: 288px;
      }
      #inputRow.show {
        display: flex;
      }
      #field {
        flex: 1;
        padding: 9px 13px;
        border-radius: 999px;
        border: 1px solid rgba(212, 175, 55, 0.45);
        background: rgba(10, 10, 14, 0.95);
        color: #f4f0e6;
        font-size: 13px;
        outline: none;
      }
      #field::placeholder {
        color: rgba(244, 240, 230, 0.4);
      }
      #jonWrap {
        position: relative;
        width: 120px;
        height: 120px;
        transform-origin: center bottom;
      }
      #jon {
        width: 120px;
        height: 120px;
        cursor: pointer;
        animation: bob 4.5s ease-in-out infinite;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.55));
      }
      #jon:active {
        cursor: grabbing;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      body.dancing #jon {
        animation: dance 0.5s ease-in-out infinite;
      }
      @keyframes dance {
        0% { transform: translateY(0) rotate(-5deg); }
        25% { transform: translateY(-8px) rotate(4deg); }
        50% { transform: translateY(0) rotate(-4deg); }
        75% { transform: translateY(-8px) rotate(5deg); }
        100% { transform: translateY(0) rotate(-5deg); }
      }
      #note {
        position: absolute;
        font-size: 17px;
        pointer-events: none;
        z-index: 6;
        opacity: 0;
      }
      #note.show { animation: noteFloat 1.6s ease-out; }
      @keyframes noteFloat {
        0% { opacity: 0; transform: translateY(0) rotate(-10deg); }
        25% { opacity: 1; transform: translateY(-14px) rotate(8deg); }
        100% { opacity: 0; transform: translateY(-40px) rotate(-8deg); }
      }
      #pomo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 128px;
        padding: 3px 10px;
        border-radius: 999px;
        background: rgba(14, 14, 18, 0.92);
        border: 1px solid rgba(212, 175, 55, 0.45);
        color: #f0d98a;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        display: none;
        z-index: 5;
        text-shadow: 0 1px 3px #000;
      }
      #pomo.show { display: block; }
      #pomo.brk {
        border-color: rgba(143, 227, 160, 0.6);
        color: #a8f0ba;
      }
      body.pomo-break #jon { animation: bob 1.6s ease-in-out infinite; }
      #eyes {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.08s;
      }
      .thinking #ring {
        animation: spin 1.4s linear infinite;
        stroke-dasharray: 40 260;
      }
      .listening #ring {
        stroke: #8fe3a0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #ring {
        transform-origin: 60px 60px;
      }
      .petBtn {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.5);
        background: rgba(20, 20, 24, 0.85);
        color: #d4af37;
        font-size: 11px;
        cursor: pointer;
        display: none;
        z-index: 6;
        line-height: 1;
      }
      #mic {
        top: 2px;
        left: 0;
      }
      #stopBtn {
        top: 2px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff8a8a;
        border-color: rgba(255, 120, 120, 0.5);
      }
      #close {
        top: 2px;
        right: 0;
        color: rgba(244, 240, 230, 0.6);
        border: none;
      }
      #mic.off {
        color: rgba(244, 240, 230, 0.35);
        border-color: rgba(255, 255, 255, 0.15);
      }
      #jonWrap:hover #mic,
      #jonWrap:hover #close {
        display: block;
      }
      #close:hover {
        color: #ff8080;
      }
      body.busy #jonWrap #stopBtn {
        display: block;
      }
      body.light #bubble {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(0, 0, 0, 0.12);
        color: #17171c;
      }
      body.light #field {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(0, 0, 0, 0.15);
        color: #17171c;
      }
      body.light #field::placeholder {
        color: rgba(0, 0, 0, 0.4);
      }
      body.light .petBtn {
        background: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="bubble"></div>
      <svg id="petPal" viewBox="0 0 64 64"></svg>
      <div id="petZzz">z</div>
      <div id="petHeart">❤</div>
      <div id="petSpeech"></div>
      <div id="note">♪</div>
      <div id="pomo"></div>
      <div id="inputRow">
        <input id="field" placeholder="Sag Emil etwas …" autocomplete="off" />
      </div>
      <div id="askRow" style="display:none;gap:8px;justify-content:center;margin-top:6px;">
        <button id="askYes" class="petBtn" style="width:auto;padding:0 14px;border-radius:14px;background:rgba(212,175,55,0.22);border-color:rgba(212,175,55,0.5);color:#f0d98a;font-weight:600;">Ja, gerne</button>
        <button id="askNo" class="petBtn" style="width:auto;padding:0 14px;border-radius:14px;">Später</button>
      </div>
      <div id="jonWrap">
        <button id="mic" class="petBtn" title="Zuhören an/aus – sag „Emil“">🎙</button>
        <button id="stopBtn" class="petBtn" title="Stopp">⏹</button>
        <button id="close" class="petBtn" title="Mini Jon ausblenden (Strg+Alt+K)">✕</button>
        <div id="jonZzz">z z</div>
        <div id="jon">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <defs>
              <linearGradient id="gold" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="120" y2="120">
                <stop offset="0%" stop-color="#f5d67b" />
                <stop offset="55%" stop-color="#d4af37" />
                <stop offset="100%" stop-color="#9a7b1f" />
              </linearGradient>
            </defs>
            <circle id="faceCircle" cx="60" cy="60" r="52" fill="#0a0a0e" />
            <circle
              id="ring"
              cx="60"
              cy="60"
              r="52"
              fill="none"
              stroke="url(#gold)"
              stroke-width="4"
              stroke-linecap="round"
            />
            <g id="cheeks" style="display: none">
              <ellipse cx="38" cy="70" rx="8" ry="5" fill="#ff9bb0" opacity="0.5" />
              <ellipse cx="82" cy="70" rx="8" ry="5" fill="#ff9bb0" opacity="0.5" />
            </g>
            <g id="eyes"></g>
            <path
              id="smile"
              d="M44 76 Q60 90 76 76"
              fill="none"
              stroke="url(#gold)"
              stroke-width="5"
              stroke-linecap="round"
            />
            <ellipse
              id="mouth"
              cx="60"
              cy="80"
              rx="13"
              ry="0"
              fill="url(#gold)"
              style="display: none"
            />
          </svg>
        </div>
      </div>
    </div>

    <script>
      const BASE = "http://127.0.0.1:8756/api";
      const jon = document.getElementById("jon");
      const jonWrap = document.getElementById("jonWrap");
      const bubble = document.getElementById("bubble");
      const inputRow = document.getElementById("inputRow");
      const field = document.getElementById("field");
      const smile = document.getElementById("smile");
      const mouth = document.getElementById("mouth");
      const eyesG = document.getElementById("eyes");
      const cheeks = document.getElementById("cheeks");
      const faceCircle = document.getElementById("faceCircle");
      const grad = document.getElementById("gold");
      const closeBtn = document.getElementById("close");
      const micBtn = document.getElementById("mic");
      const stopBtn = document.getElementById("stopBtn");

      let cfg = {
        theme: "dark",
        pet_accent: "#d4af37",
        pet_face: "#0a0a0e",
        pet_cheeks: false,
        pet_scale: 1,
        pet_eyes: "round",
        provider: "",
        model: "",
        pet_provider: "",
        pet_model: "",
        pet_wellness: true,
      };
      let bubbleTimer = null;
      let busy = false;
      let mouthTimer = null;
      let currentAbort = null;
      let canceled = false;

      const MEM_KEY = "emil_memory";
      const MEM_MAX = 16;
      const MEM_SEND = 8;
      let convo = [];
      try {
        convo = JSON.parse(localStorage.getItem(MEM_KEY)) || [];
      } catch (e) {
        convo = [];
      }
      function rememberTurn(userText, botText) {
        convo.push({ role: "user", content: userText });
        convo.push({ role: "assistant", content: botText });
        convo = convo.slice(-MEM_MAX);
        try {
          localStorage.setItem(MEM_KEY, JSON.stringify(convo));
        } catch (e) {}
      }

      function clamp(v) {
        return Math.max(0, Math.min(255, Math.round(v)));
      }
      function hexToRgb(h) {
        h = h.replace("#", "");
        if (h.length === 3) h = h.split("").map((c) => c + c).join("");
        return [
          parseInt(h.slice(0, 2), 16),
          parseInt(h.slice(2, 4), 16),
          parseInt(h.slice(4, 6), 16),
        ];
      }
      function toHex(r, g, b) {
        return (
          "#" +
          [r, g, b].map((x) => clamp(x).toString(16).padStart(2, "0")).join("")
        );
      }
      function shade(hex, amt) {
        try {
          const [r, g, b] = hexToRgb(hex);
          if (amt >= 0)
            return toHex(r + (255 - r) * amt, g + (255 - g) * amt, b + (255 - b) * amt);
          const f = 1 + amt;
          return toHex(r * f, g * f, b * f);
        } catch (e) {
          return hex;
        }
      }

      function renderEyes(style) {
        const c = "url(#gold)";
        if (style === "happy") {
          eyesG.innerHTML =
            '<path d="M35 55 Q43 46 51 55" fill="none" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>' +
            '<path d="M69 55 Q77 46 85 55" fill="none" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>';
        } else if (style === "sleepy") {
          eyesG.innerHTML =
            '<path d="M36 53 h13" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>' +
            '<path d="M71 53 h13" stroke="' +
            c +
            '" stroke-width="5" stroke-linecap="round"/>';
        } else {
          eyesG.innerHTML =
            '<circle cx="43" cy="53" r="8" fill="' +
            c +
            '"/><circle cx="77" cy="53" r="8" fill="' +
            c +
            '"/>' +
            '<circle cx="45.5" cy="50.5" r="2.5" fill="#fff"/>' +
            '<circle cx="79.5" cy="50.5" r="2.5" fill="#fff"/>';
        }
      }

      let lastCfgJson = "";
      function applyConfig(s) {
        const next = { ...cfg, ...s };
        const json = JSON.stringify(next);
        if (json === lastCfgJson) return;
        lastCfgJson = json;
        cfg = next;
        const accent = cfg.pet_accent || "#d4af37";
        const light = cfg.theme === "light";
        document.body.classList.toggle("light", light);
        const stops = grad.children;
        if (light) {
          stops[0].setAttribute("stop-color", accent);
          stops[1].setAttribute("stop-color", shade(accent, -0.2));
          stops[2].setAttribute("stop-color", shade(accent, -0.42));
        } else {
          stops[0].setAttribute("stop-color", shade(accent, 0.35));
          stops[1].setAttribute("stop-color", accent);
          stops[2].setAttribute("stop-color", shade(accent, -0.3));
        }
        faceCircle.setAttribute("fill", light ? "#ffffff" : cfg.pet_face || "#0a0a0e");
        cheeks.style.display = cfg.pet_cheeks ? "block" : "none";
        renderEyes(cfg.pet_eyes || "round");
        jonWrap.style.transform = "scale(" + (cfg.pet_scale || 1) + ")";
        const nextPet = cfg.pet_companion || "none";
        if (nextPet !== petKind) {
          petKind = nextPet;
          renderPet(petKind, accent);
          if (petKind !== "none") setPetSleep(petAsleep);
        }
      }

      function setState(cls) {
        jon.classList.remove("thinking", "listening");
        if (cls) jon.classList.add(cls);
      }

      function scheduleHide(ms) {
        if (bubbleTimer) clearTimeout(bubbleTimer);
        bubbleTimer = setTimeout(() => {
          bubble.classList.remove("show");
          if (typeof hideAsk === "function") hideAsk();
        }, ms);
      }
      function say(text, keep) {
        if (!text) return;
        bubble.textContent = text;
        bubble.classList.add("show");
        if (bubbleTimer) clearTimeout(bubbleTimer);
        if (!keep) scheduleHide(9000);
      }

      function openMouth(a) {
        smile.style.display = a > 0.05 ? "none" : "block";
        mouth.style.display = a > 0.05 ? "block" : "none";
        mouth.setAttribute("ry", (2 + a * 9).toFixed(1));
      }
      function stopMouth() {
        if (mouthTimer) clearInterval(mouthTimer);
        mouthTimer = null;
        openMouth(0);
      }

      let voice = null;
      const MALE = /stefan|klaus|conrad|bernd|jonas|paul|markus|male|mann/i;
      function pickVoice() {
        const voices = window.speechSynthesis.getVoices();
        const german = voices.filter((v) => v.lang.toLowerCase().startsWith("de"));
        voice = german.find((v) => MALE.test(v.name)) || german[0] || voices[0] || null;
      }
      pickVoice();
      window.speechSynthesis.onvoiceschanged = pickVoice;

      let primed = false;
      function primeSpeech() {
        if (primed) return;
        primed = true;
        try {
          window.speechSynthesis.resume();
          const u = new SpeechSynthesisUtterance(" ");
          u.volume = 0;
          window.speechSynthesis.speak(u);
        } catch (e) {}
      }
      function cleanForSpeech(t) {
        return t
          .replace(/```[\s\S]*?```/g, " ")
          .replace(/`[^`]*`/g, " ")
          .replace(/\[(.*?)\]\(.*?\)/g, "$1")
          .replace(/https?:\/\/\S+/g, " Link ")
          .replace(/^\s*[-*+]\s+/gm, " ")
          .replace(/-{2,}/g, " ")
          .replace(/[*_#>`|]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      const EMIL_VOICE = "de-DE-KillianNeural";
      const EMIL_PITCH = "+0Hz";
      const EMIL_RATE = "+10%";
      const EMIL_VOLUME = "+45%";
      const BOOST = 2.4;
      const FIRST_CHUNK = 80;
      const NEXT_CHUNK = 160;

      let audioCtx = null;
      let player = null;
      let analyser = null;
      let mouthFrame = null;

      function stopAudio() {
        if (mouthFrame) cancelAnimationFrame(mouthFrame);
        mouthFrame = null;
        if (player) {
          try {
            player.pause();
          } catch (e) {}
          player = null;
        }
        analyser = null;
      }

      function driveMouth() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        const tick = () => {
          if (!analyser) return;
          analyser.getByteTimeDomainData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) {
            const v = (data[i] - 128) / 128;
            sum += v * v;
          }
          const level = Math.sqrt(sum / data.length);
          openMouth(Math.min(1, level * 6));
          mouthFrame = requestAnimationFrame(tick);
        };
        mouthFrame = requestAnimationFrame(tick);
      }

      function splitForSpeech(text) {
        const satzteile = text.match(/[^.!?…]+[.!?…]*/g) || [text];
        const stuecke = [];
        let aktuell = "";
        for (const roh of satzteile) {
          const s = roh.trim();
          if (!s) continue;
          const grenze = stuecke.length === 0 ? FIRST_CHUNK : NEXT_CHUNK;
          const zusammen = aktuell ? aktuell + " " + s : s;
          if (aktuell && zusammen.length > grenze) {
            stuecke.push(aktuell);
            aktuell = s;
          } else {
            aktuell = zusammen;
          }
        }
        if (aktuell) stuecke.push(aktuell);
        return stuecke;
      }

      async function fetchVoice(text) {
        const res = await fetch(`${BASE}/system/tts`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            voice: EMIL_VOICE,
            rate: EMIL_RATE,
            volume: EMIL_VOLUME,
            pitch: EMIL_PITCH,
          }),
        });
        if (!res.ok) throw new Error("tts");
        return res.blob();
      }

      async function playBlob(blob) {
        const url = URL.createObjectURL(blob);
        const el = new Audio(url);
        el.volume = 1;
        audioCtx = audioCtx || new AudioContext();
        await audioCtx.resume();
        const roh = audioCtx.state !== "running";
        if (!roh) {
          const source = audioCtx.createMediaElementSource(el);
          const compressor = audioCtx.createDynamicsCompressor();
          compressor.threshold.value = -18;
          compressor.knee.value = 12;
          compressor.ratio.value = 4;
          compressor.attack.value = 0.003;
          compressor.release.value = 0.2;
          const gain = audioCtx.createGain();
          gain.gain.value = BOOST;
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          source.connect(compressor);
          compressor.connect(gain);
          gain.connect(analyser);
          analyser.connect(audioCtx.destination);
        }
        player = el;
        lookX = 0;
        lookY = 0;
        eyeTransform(1);
        if (roh) {
          if (mouthTimer) clearInterval(mouthTimer);
          mouthTimer = setInterval(
            () => openMouth(0.25 + Math.random() * 0.75),
            95
          );
        } else {
          driveMouth();
        }

      function downsample(chunks, rate) {
        let total = 0;
        for (const c of chunks) total += c.length;
        const merged = new Float32Array(total);
        let o = 0;
        for (const c of chunks) {
          merged.set(c, o);
          o += c.length;
        }
        const ratio = rate / 16000;
        const outLen = Math.floor(merged.length / ratio);
        const out = new Int16Array(outLen);
        for (let i = 0; i < outLen; i++) {
          const start = Math.floor(i * ratio);
          const end = Math.min(Math.floor((i + 1) * ratio), merged.length);
          let sum = 0;
          for (let j = start; j < end; j++) sum += merged[j];
          const s = sum / Math.max(end - start, 1);
          out[i] = Math.max(-1, Math.min(1, s)) * 0x7fff;
        }
        return out;
      }
      function encodeWav(samples) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);
        const ws = (p, s) => {
          for (let i = 0; i < s.length; i++) view.setUint8(p + i, s.charCodeAt(i));
        };
        ws(0, "RIFF");
        view.setUint32(4, 36 + samples.length * 2, true);
        ws(8, "WAVE");
        ws(12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, 16000, true);
        view.setUint32(28, 32000, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        ws(36, "data");
        view.setUint32(40, samples.length * 2, true);
        for (let i = 0; i < samples.length; i++)
          view.setInt16(44 + i * 2, samples[i], true);
        return new Blob([buffer], { type: "audio/wav" });
      }

      class Listener {
        constructor() {
          this.preroll = [];
          this.utt = [];
          this.inUtt = false;
          this.speechMs = 0;
          this.silenceMs = 0;
          this.uttMs = 0;
          this.engaged = false;
          this.running = false;
          this.busy = false;
          this.oneShot = false;
        }
        setBusy(b) {
          this.busy = b;
        }
        async start() {
          if (this.running) return;
          this.stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          this.ctx = new AudioContext();
          await this.ctx.resume().catch(() => {});
          this.src = this.ctx.createMediaStreamSource(this.stream);
          this.proc = this.ctx.createScriptProcessor(4096, 1, 1);
          this.proc.onaudioprocess = (e) => this.onChunk(e);
          this.src.connect(this.proc);
          this.proc.connect(this.ctx.destination);
          this.running = true;
          this.engaged = false;
          listening = true;
          setState("listening");
        }
        stop() {
          this.running = false;
          this.engaged = false;
          listening = false;
          try {
            this.proc && this.proc.disconnect();
            this.src && this.src.disconnect();
            this.stream && this.stream.getTracks().forEach((t) => t.stop());
            this.ctx && this.ctx.close();
          } catch (e) {}
          setState("");
        }
        onChunk(e) {
          if (!this.running) return;
          const input = e.inputBuffer.getChannelData(0);
          const chunk = new Float32Array(input);
          const chunkMs = (chunk.length / this.ctx.sampleRate) * 1000;
          let sum = 0;
          for (let i = 0; i < chunk.length; i++) sum += chunk[i] * chunk[i];
          const voiced = Math.sqrt(sum / chunk.length) > SPEECH_THRESHOLD;
          if (!this.inUtt) {
            this.preroll.push(chunk);
            if (this.preroll.length > PREROLL) this.preroll.shift();
            if (voiced) {
              this.inUtt = true;
              this.utt = [...this.preroll];
              this.speechMs = chunkMs;
              this.silenceMs = 0;
              this.uttMs = chunkMs;
            }
            return;
          }
          this.utt.push(chunk);
          this.uttMs += chunkMs;
          if (voiced) {
            this.speechMs += chunkMs;
            this.silenceMs = 0;
          } else this.silenceMs += chunkMs;
          if (this.silenceMs >= SILENCE_END_MS || this.uttMs >= MAX_UTTERANCE_MS) {
            const chunks = this.utt;
            const speechMs = this.speechMs;
            this.inUtt = false;
            this.utt = [];
            this.preroll = [];
            if (speechMs >= MIN_SPEECH_MS) this.finish(chunks, this.ctx.sampleRate);
          }
        }
        async finish(chunks, rate) {
          let text = "";
          try {
            const wav = encodeWav(downsample(chunks, rate));
            const res = await fetch(`${BASE}/system/transcribe`, {
              method: "POST",
              body: wav,
            });
            text = ((await res.json()).text || "").trim();
          } catch (e) {}
          if (!this.running) return;
          this.handle(text);
          if (this.oneShot) {
            this.oneShot = false;
            this.stop();
            if (wakeMode) {
              listening = true;
              setState(busy ? "" : "listening");
            }
          }
        }
        handle(text) {
          if (!text) return;
          const words = text
            .toLowerCase()
            .replace(/[^\p{L}\p{N} ]/gu, " ")
            .split(/\s+/)
            .filter(Boolean);
          const wakeIdx = words.findIndex((w) => WAKE.has(w));
          if (busy) {
            if (isEcho(words)) return;
            if (!this.engaged && wakeIdx < 0) return;
            cancel();
          }
          if (this.engaged) {
            ask(text);
            return;
          }
          const idx = wakeIdx;
          if (idx < 0) return;
          this.engaged = true;
          let start = idx + 1;
          if (words[idx] === "mini" && (words[start] === "jon" || words[start] === "john"))
            start += 1;
          const command = words.slice(start).join(" ").trim();
          if (command.length >= 3) ask(command);
          else {
            primeSpeech();
            say("Ja?", true);
            speak("Ja?", () => scheduleHide(2500));
          }
        }
      }

      let listener = null;
      let wakeMode = false;
      let wakePollTimer = null;
      let wakeShotTimer = null;
      let wakeCounter = -1;
      async function tryBackendWake() {
        try {
          const r = await (
            await fetch(`${BASE}/voice/wake/start`, { method: "POST" })
          ).json();
          return r.listening === true;
        } catch (e) {
          return false;
        }
      }
      async function pollWake() {
        try {
          const r = await (await fetch(`${BASE}/voice/wake`)).json();
          if (!r.listening) {
            fetch(`${BASE}/voice/wake/start`, { method: "POST" }).catch(() => {});
            return;
          }
          if (wakeCounter < 0) {
            wakeCounter = r.counter;
            return;
          }
          if (r.counter > wakeCounter) {
            wakeCounter = r.counter;
            onWake();
          }
        } catch (e) {}
      }
      function onWake() {
        primeSpeech();
        if (busy) cancel();
        if (!listener) listener = new Listener();
        listener.engaged = true;
        listener.oneShot = true;
        listener.start().catch(() => {});
        setState("listening");
        if (wakeShotTimer) clearTimeout(wakeShotTimer);
        wakeShotTimer = setTimeout(() => {
          if (listener && listener.oneShot) {
            listener.oneShot = false;
            listener.stop();
            listening = true;
            setState(busy ? "" : "listening");
          }
        }, 12000);
      }
      function setMic(on) {
        localStorage.setItem("jonjr_voice", on ? "1" : "0");
        micBtn.classList.toggle("off", !on);
        if (on) {
          tryBackendWake().then((ok) => {
            if (localStorage.getItem("jonjr_voice") === "0") return;
            if (ok) {
              wakeMode = true;
              wakeCounter = -1;
              listening = true;
              setState("listening");
              if (!wakePollTimer) wakePollTimer = setInterval(pollWake, 500);
              return;
            }
            wakeMode = false;
            if (!listener) listener = new Listener();
            listener.start().catch(() => {
              micBtn.classList.add("off");
              localStorage.setItem("jonjr_voice", "0");
            });
          });
        } else {
          wakeMode = false;
          if (wakePollTimer) {
            clearInterval(wakePollTimer);
            wakePollTimer = null;
          }
          listening = false;
          setState("");
          if (listener) {
            listener.stop();
            listener = null;
          }
        }
      }
      micBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        primeSpeech();
        setMic(localStorage.getItem("jonjr_voice") === "0");
      });
      stopBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        cancel();
      });

      let dragging = false;
      let moved = 0;
      let lastX = 0;
      let lastY = 0;
      let clickTimer = null;
      function tap() {
        primeSpeech();
        if (busy) {
          cancel();
          return;
        }
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          window.jonpet && window.jonpet.showApp();
          return;
        }
        clickTimer = setTimeout(() => {
          clickTimer = null;
          inputRow.classList.toggle("show");
          if (inputRow.classList.contains("show")) field.focus();
        }, 240);
      }
      jon.addEventListener("mousedown", (e) => {
        dragging = true;
        moved = 0;
        lastX = e.screenX;
        lastY = e.screenY;
        e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (dragging) {
          const dx = e.screenX - lastX;
          const dy = e.screenY - lastY;
          lastX = e.screenX;
          lastY = e.screenY;
          moved += Math.abs(dx) + Math.abs(dy);
          if ((dx || dy) && window.jonpet) window.jonpet.moveBy(dx, dy);
          applyIgnore(false);
          return;
        }
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const interactive =
          el &&
          el.closest(
            "#jon, #mic, #close, #stopBtn, #bubble.show, #inputRow.show, #petPal.show"
          );
        applyIgnore(!interactive);
      });
      window.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        if (moved < 6) tap();
      });

      let ignoring = null;
      function applyIgnore(next) {
        if (next === ignoring) return;
        ignoring = next;
        window.jonpet && window.jonpet.setIgnore(next);
      }

      field.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const t = field.value;
          field.value = "";
          inputRow.classList.remove("show");
          ask(t);
        }
        if (e.key === "Escape") inputRow.classList.remove("show");
      });
      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        window.jonpet && window.jonpet.hide();
      });

      async function loadConfig() {
        try {
          const s = await (await fetch(`${BASE}/settings`)).json();
          applyConfig(s);
        } catch (e) {}
      }

      const petPal = document.getElementById("petPal");
      const petZzz = document.getElementById("petZzz");
      const petHeart = document.getElementById("petHeart");
      let petKind = "none";
      let petAsleep = false;
      let palFacing = 1;

      function renderPet(kind, accent) {
        if (kind === "cat") {
          petPal.innerHTML =
            '<ellipse cx="32" cy="46" rx="18" ry="14" fill="#5a5a64"/>' +
            '<path d="M18 30 L14 16 L26 26 Z" fill="#5a5a64"/>' +
            '<path d="M46 30 L50 16 L38 26 Z" fill="#5a5a64"/>' +
            '<path d="M19 29 L17 21 L24 27 Z" fill="#ffb3c1"/>' +
            '<path d="M45 29 L47 21 L40 27 Z" fill="#ffb3c1"/>' +
            '<circle cx="32" cy="34" r="15" fill="#6d6d78"/>' +
            '<circle cx="26" cy="32" r="2.6" fill="#111"/>' +
            '<circle cx="38" cy="32" r="2.6" fill="#111"/>' +
            '<path d="M30 37 Q32 39 34 37" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>' +
            '<path d="M32 36 l0 2" stroke="#ffb3c1" stroke-width="1.6"/>' +
            '<path d="M20 36 h-9 M20 39 h-8" stroke="#3a3a42" stroke-width="1.2" stroke-linecap="round"/>' +
            '<path d="M44 36 h9 M44 39 h8" stroke="#3a3a42" stroke-width="1.2" stroke-linecap="round"/>' +
            '<path d="M50 52 Q60 48 56 40" fill="none" stroke="#5a5a64" stroke-width="6" stroke-linecap="round"/>';
        } else if (kind === "dog") {
          petPal.innerHTML =
            '<ellipse cx="32" cy="46" rx="19" ry="14" fill="#b98a55"/>' +
            '<ellipse cx="16" cy="34" rx="7" ry="12" fill="#8a5f34"/>' +
            '<ellipse cx="48" cy="34" rx="7" ry="12" fill="#8a5f34"/>' +
            '<circle cx="32" cy="34" r="15" fill="#caa06a"/>' +
            '<ellipse cx="32" cy="40" rx="8" ry="6" fill="#f0dfc4"/>' +
            '<circle cx="26" cy="31" r="2.7" fill="#111"/>' +
            '<circle cx="38" cy="31" r="2.7" fill="#111"/>' +
            '<ellipse cx="32" cy="38" rx="3" ry="2.2" fill="#3a2a1a"/>' +
            '<path d="M32 40 Q32 44 28 44" fill="none" stroke="#7a5a34" stroke-width="1.6" stroke-linecap="round"/>' +
            '<path d="M50 50 Q60 44 54 38" fill="none" stroke="#b98a55" stroke-width="6" stroke-linecap="round"/>';
        } else {
          petPal.innerHTML = "";
        }
        petPal.classList.toggle("show", kind !== "none");
        petPal.style.setProperty("--dir", palFacing);
      }

      function petName() {
        return petKind === "cat" ? "Minka" : petKind === "dog" ? "Rocky" : "";
      }

      function setPetSleep(sleep) {
        if (petKind === "none") return;
        petAsleep = sleep;
        petZzz.classList.toggle("show", sleep);
        petPal.style.filter = sleep ? "brightness(0.6)" : "none";
      }

      let palX = 14;
      function wanderPet() {
        if (petKind === "none" || petAsleep || busy) return;
        if (Math.random() < 0.5) {
          const dir = Math.random() < 0.5 ? -1 : 1;
          palX = Math.max(8, Math.min(180, palX + dir * (18 + Math.random() * 26)));
          palFacing = dir;
          petPal.style.setProperty("--dir", palFacing);
          petPal.style.transform = "scaleX(" + palFacing + ")";
          petPal.style.left = palX + "px";
        }
      }

      const PET_ACTIONS = [
        (n) => "Ich streichle " + n + " kurz. 🐾",
        (n) => "Ich geb " + n + " was zu fressen.",
        (n) => n + " will spielen — kurze Runde!",
        (n) => n + " schnurrt zufrieden.",
        (n) => "Ich krault " + n + " hinterm Ohr.",
      ];
      const PET_ACTIONS_DOG = [
        (n) => "Ich werf " + n + " den Ball. 🎾",
        (n) => "Ich geb " + n + " ein Leckerli.",
        (n) => n + " wedelt mit dem Schwanz!",
        (n) => "Ich kraul " + n + " den Bauch.",
        (n) => n + " will Gassi — na gut, kurz!",
      ];
      function petInteract() {
        if (petKind === "none" || petAsleep || busy || listening) return;
        const n = petName();
        const pool = petKind === "dog" ? PET_ACTIONS_DOG : PET_ACTIONS;
        petPal.classList.remove("happy");
        void petPal.offsetWidth;
        petPal.classList.add("happy");
        spawnHearts(3);
        petSound();
        say(pool[Math.floor(Math.random() * pool.length)](n));
        scheduleHide(4500);
      }

      const petSpeech = document.getElementById("petSpeech");
      function spawnHearts(count) {
        const rect = petPal.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const top = rect.top;
        for (let i = 0; i < count; i++) {
          const h = document.createElement("div");
          h.className = "heartParticle";
          h.textContent = ["❤", "💕", "💛", "🧡"][Math.floor(Math.random() * 4)];
          h.style.left = cx - 9 + (Math.random() * 30 - 15) + "px";
          h.style.top = top - 6 + "px";
          h.style.setProperty("--drift", (Math.random() * 30 - 15) + "px");
          h.style.setProperty("--rot", (Math.random() * 30 - 15) + "deg");
          h.style.animationDelay = i * 0.12 + "s";
          document.body.appendChild(h);
          setTimeout(() => h.remove(), 1800 + i * 120);
        }
      }
      function showPetSpeech(text) {
        const rect = petPal.getBoundingClientRect();
        petSpeech.textContent = text;
        petSpeech.style.left = rect.left + rect.width / 2 - 12 + "px";
        petSpeech.style.top = rect.top - 22 + "px";
        petSpeech.classList.remove("show");
        void petSpeech.offsetWidth;
        petSpeech.classList.add("show");
      }

      let petAudioCtx = null;
      function petAudio() {
        try {
          if (!petAudioCtx) petAudioCtx = new AudioContext();
          if (petAudioCtx.state !== "running") petAudioCtx.resume();
          return petAudioCtx.state === "running" ? petAudioCtx : null;
        } catch (e) {
          return null;
        }
      }
      function bark() {
        const ctx = petAudio();
        showPetSpeech("Wuff!");
        if (!ctx) return;
        for (let k = 0; k < 2; k++) {
          const t = ctx.currentTime + k * 0.16;
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = "sawtooth";
          o.frequency.setValueAtTime(260, t);
          o.frequency.exponentialRampToValueAtTime(150, t + 0.09);
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.28, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(t);
          o.stop(t + 0.15);
        }
      }
      function meow() {
        const ctx = petAudio();
        showPetSpeech("Miau~");
        if (!ctx) return;
        const t = ctx.currentTime;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "triangle";
        o.frequency.setValueAtTime(620, t);
        o.frequency.linearRampToValueAtTime(880, t + 0.18);
        o.frequency.linearRampToValueAtTime(560, t + 0.5);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.22, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(t);
        o.stop(t + 0.6);
      }
      function purr() {
        const ctx = petAudio();
        showPetSpeech("Schnurr…");
        if (!ctx) return;
        const t = ctx.currentTime;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sawtooth";
        o.frequency.setValueAtTime(45, t);
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.frequency.setValueAtTime(28, t);
        lfoGain.gain.setValueAtTime(0.12, t);
        lfo.connect(lfoGain);
        lfoGain.connect(g.gain);
        g.gain.setValueAtTime(0.14, t);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(t);
        lfo.start(t);
        o.stop(t + 1.1);
        lfo.stop(t + 1.1);
      }
      function petSound() {
        if (petKind === "dog") bark();
        else if (petKind === "cat") Math.random() < 0.5 ? meow() : purr();
      }

      petPal.addEventListener("click", () => {
        if (petKind === "none") return;
        if (petAsleep) {
          setPetSleep(false);
          say(petName() + " ist aufgewacht. 🐾");
          scheduleHide(3500);
        }
        spawnHearts(5);
        petPal.classList.remove("happy");
        void petPal.offsetWidth;
        petPal.classList.add("happy");
        petSound();
      });

      function petTick() {
        if (petKind === "none" || document.hidden) return;
        if (petAsleep || busy) return;
        wanderPet();
        const r = Math.random();
        if (r < 0.4) petInteract();
        else if (r < 0.7) petSound();
      }
      setInterval(petTick, 14000);
      setInterval(() => { if (!petAsleep && !busy) wanderPet(); }, 5000);

      renderEyes("round");
      applyIgnore(true);
      loadConfig();
      setInterval(loadConfig, 1500);
      if (localStorage.getItem("jonjr_voice") !== "0") setTimeout(() => setMic(true), 1500);
      else micBtn.classList.add("off");
      setTimeout(startupGreeting, 1200);

      if (window.jonpet && window.jonpet.onRead) {
        window.jonpet.onRead((text) => {
          const clean = (text || "").trim();
          if (!clean) return;
          primeSpeech();
          if (busy) cancel();
          const preview = clean.length > 220 ? clean.slice(0, 220) + " …" : clean;
          say("📖 " + preview, true);
          scheduleHide(8000);
          speak(clean, () => scheduleHide(2500), () => setState(""));
        });
      }
    </script>
  </body>

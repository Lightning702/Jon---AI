<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Jon Schnellfrage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 10px;
    -webkit-user-select: none;
  }
  .card {
    width: 100%;
    background: rgba(8, 8, 12, 0.92);
    border: 1px solid rgba(212, 175, 55, 0.35);
    border-radius: 20px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(18px);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: calc(100vh - 20px);
  }
  .row { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #f5d97a, #d4af37 55%, #8a6d1f);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #0a0a0e; font-size: 13px; flex: none;
  }
  #frage {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    padding: 9px 12px;
    color: rgba(255, 255, 255, 0.92);
    font-size: 14px;
    outline: none;
  }
  #frage:focus { border-color: rgba(212, 175, 55, 0.55); }
  #frage::placeholder { color: rgba(255, 255, 255, 0.3); }
  .hint {
    color: rgba(255, 255, 255, 0.28);
    font-size: 10.5px;
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }
  .hint button {
    background: none; border: none; color: rgba(212, 175, 55, 0.75);
    cursor: pointer; font-size: 10.5px; padding: 0;
  }
  .hint button:hover { color: #d4af37; }
  #antwort {
    display: none;
    color: rgba(255, 255, 255, 0.88);
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-y: auto;
    max-height: 300px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding-top: 10px;
    -webkit-user-select: text;
  }
  #antwort::-webkit-scrollbar { width: 6px; }
  #antwort::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 3px; }
  #tools { display: none; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 10.5px;
    color: rgba(212, 175, 55, 0.9);
    border: 1px solid rgba(212, 175, 55, 0.3);
    background: rgba(212, 175, 55, 0.1);
    border-radius: 8px;
    padding: 2px 8px;
  }
  #approval {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(212, 175, 55, 0.4);
    background: rgba(212, 175, 55, 0.08);
    border-radius: 12px;
    padding: 8px 10px;
  }
  #approval span { flex: 1; }
  #approval button {
    border: none; border-radius: 8px; padding: 5px 12px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  #ja { background: linear-gradient(135deg, #f5d97a, #b8952e); color: #0a0a0e; }
  #nein { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); }
  .pulse {
    display: inline-block; width: 8px; height: 14px; margin-left: 2px;
    background: #d4af37; border-radius: 2px; vertical-align: middle;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.15; } }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="logo">J</div>
      <input id="frage" placeholder="Frag Jon irgendetwas …" autofocus />
    </div>
    <div id="tools"></div>
    <div id="approval">
      <span id="approvalText"></span>
      <button id="ja">Erlauben</button>
      <button id="nein">Ablehnen</button>
    </div>
    <div id="antwort"></div>
    <div class="hint">
      <span>Enter senden · Esc schließen</span>
      <button id="openJon">In Jon öffnen ↗</button>
    </div>
  </div>
<script>
  const API = "http://127.0.0.1:8756/api";
  const input = document.getElementById("frage");
  const antwort = document.getElementById("antwort");
  const tools = document.getElementById("tools");
  const approval = document.getElementById("approval");
  const approvalText = document.getElementById("approvalText");
  let history = [];
  let busy = false;
  let approvalId = null;

  function reset() {
    antwort.style.display = "none";
    antwort.textContent = "";
    tools.style.display = "none";
    tools.innerHTML = "";
    approval.style.display = "none";
    approvalId = null;
  }

  function hideWindow() {
    reset();
    input.value = "";
    history = [];
    busy = false;
    window.quickask.hide();
  }

  async function decide(ok) {
    if (!approvalId) return;
    const id = approvalId;
    approvalId = null;
    approval.style.display = "none";
    await fetch(API + "/chat/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id, approved: ok }),
    }).catch(() => {});
  }

  document.getElementById("ja").addEventListener("click", () => decide(true));
  document.getElementById("nein").addEventListener("click", () => decide(false));
  document.getElementById("openJon").addEventListener("click", () => {
    window.quickask.openMain();
    hideWindow();
  });

  function addChip(name) {
    tools.style.display = "flex";
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = "⚙ " + name;
    tools.appendChild(chip);
  }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true;
    reset();
    antwort.style.display = "block";
    antwort.innerHTML = 'Jon denkt nach <span class="pulse"></span>';
    const outgoing = history.concat([{ role: "user", content: text }]);
    let answer = "";
    try {
      const res = await fetch(API + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: outgoing,
          persist: false,
          conversation_id: null,
          tool_mode: "ask",
        }),
      });
      if (!res.ok || !res.body) throw new Error("Backend nicht erreichbar");
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data:")) continue;
          let evt;
          try {
            evt = JSON.parse(line.slice(5).trim());
          } catch {
            continue;
          }
          if (evt.type === "content") {
            answer += evt.delta || "";
            antwort.textContent = answer;
            antwort.scrollTop = antwort.scrollHeight;
          } else if (evt.type === "tool" && evt.status === "running") {
            addChip(evt.summary || evt.name || "Aktion");
            if (evt.approval_id) {
              approvalId = evt.approval_id;
              approvalText.textContent = evt.summary || "Jon möchte eine Aktion ausführen.";
              approval.style.display = "flex";
            }
          } else if (evt.type === "error") {
            answer += (answer ? "\n\n" : "") + "[Fehler] " + (evt.message || "");
            antwort.textContent = answer;
          }
        }
      }
      if (answer) {
        history = outgoing.concat([{ role: "assistant", content: answer }]).slice(-8);
      }
      if (!answer) antwort.textContent = "Keine Antwort erhalten.";
    } catch (e) {
      antwort.textContent = "Jon ist gerade nicht erreichbar. Läuft das Backend?";
    }
    approval.style.display = "none";
    approvalId = null;
    busy = false;
    input.value = "";
    input.focus();
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      send();
    } else if (e.key === "Escape") {
      hideWindow();
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") hideWindow();
  });
  window.quickask.onFocus(() => {
    input.focus();
    input.select();
  });
  window.addEventListener("focus", () => input.focus());
</script>
</body>
</html>
